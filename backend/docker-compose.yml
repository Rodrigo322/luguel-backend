services:
  api:
    build: .
    container_name: luguel-api
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - "3333:3333"
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules

  postgres:
    image: postgres:16-alpine
    container_name: luguel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: luguel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: luguel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
